# AI Agent Lab — Blog add-on (overlay)
#
# Apply WITHOUT editing the core compose:
#   docker compose -f docker-compose.yaml -f docker-compose.blog.yml up -d --build
#
# This adds the `blog` (Wagtail) service and renders an extra nginx vhost
# (blog.conf) alongside the core default.conf — no core files are overwritten.

services:
  blog:
    build:
      context: blog
    environment:
      - DJANGO_SETTINGS_MODULE=mysite.settings.production
    volumes:
      - blog-data:/app/data
      - blog-media:/app/media
    env_file:
      - .env          # needs DOMAIN; blog also reads WAGTAIL_SECRET_KEY (see .env.blog.example)

  # Extend nginx: mount the blog vhost template and render it next to default.conf.
  # `volumes` and `depends_on` merge with the core service; `command` is replaced
  # (it now renders BOTH templates, then starts nginx).
  nginx:
    volumes:
      - ./nginx/conf.d/blog.conf.template:/etc/nginx/conf.d/blog.conf.template
    command: >
      /bin/bash -c "envsubst '$$DOMAIN' < /etc/nginx/conf.d/default.conf.template > /etc/nginx/conf.d/default.conf
      && envsubst '$$DOMAIN' < /etc/nginx/conf.d/blog.conf.template > /etc/nginx/conf.d/blog.conf
      && exec nginx -g 'daemon off;'"
    depends_on:
      - blog

volumes:
  blog-data:
  blog-media:
