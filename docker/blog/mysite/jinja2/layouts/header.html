<style>
  /* Ported from aiagentui's top-header (sidebar offset removed — the blog has no sidebar). */
  .top-header {
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .top-header.is-dark {
    background: #1a1a1a;
    border-bottom: 1px solid #333;
  }
  .header-actions {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .theme-toggle-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 34px;
    height: 34px;
    padding: 0;
    border: none;
    background: none;
    cursor: pointer;
    line-height: 0;
  }
</style>
<header class="top-header is-dark">
   <div class="p-navigation__tagged-logo">
      <div class="p-navigation__logo-tag">
         <img class="p-navigation__logo-icon" src="{{ url_for('static', filename='img/quantiota-white-icon.svg') }}" alt="Lab Journal">
      </div>
      <span class="p-navigation__logo-title">Lab Journal</span>
   </div>
   <div class="header-actions">
      <button id="theme-toggle" class="theme-toggle-btn p-navigation__link">
         <span style="display: inline-flex; align-items: center;">
            <img src="{{ url_for('static', filename='img/sun-02-stroke-standard-white.svg') }}" alt="Light mode icon" class="theme-toggle-icon light-icon" width="24" height="24" style="display: block;">
            <img src="{{ url_for('static', filename='img/moon-02-stroke-standard-white.svg') }}" alt="Dark mode icon" class="theme-toggle-icon dark-icon" width="24" height="24" style="display: none;">
         </span>
      </button>
   </div>
</header>
